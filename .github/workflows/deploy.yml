# .github/workflows/deploy.yml
name: Deploy to AWS
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # STEP 1 — Terraform: create ECR + EC2
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2
      - run: terraform init && terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # STEP 2 — Build + push Docker image to ECR
      - run: |
          ECR_URI=$(terraform output -raw ecr_uri)
          aws ecr get-login-password | docker login --username AWS \
            --password-stdin $ECR_URI
          docker build -t $ECR_URI:latest .
          docker push $ECR_URI:latest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # STEP 3 — SSH into EC2, pull image, run container
      - run: |
          EC2_IP=$(terraform output -raw ec2_public_ip)
          ssh -o StrictHostKeyChecking=no ec2-user@$EC2_IP '
            sudo yum install -y docker && sudo service docker start
            aws ecr get-login-password | sudo docker login ...
            sudo docker pull $ECR_URI:latest
            sudo docker run -d -p 80:5000 $ECR_URI:latest
            echo "SUCCESS! Web server validation complete."
          '