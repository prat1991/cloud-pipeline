# .github/workflows/deploy.yml
name: Deploy to AWS
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # FIX: v3 deprecated, updated to v4 for Node.js 24 support

      - name: Setup SSH key # FIX: write private key to runner so SSH can authenticate into EC2
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/cloud-pipeline  # FIX: private key from GitHub secret written to runner disk
          chmod 600 ~/.ssh/cloud-pipeline                                      # FIX: SSH rejects key files that aren't owner-only readable

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3 # FIX: v2 deprecated, updated to v3 for Node.js 24 support
        with:
          terraform_wrapper: false # FIX: needed so output commands work cleanly

      - name: Terraform init
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1 # FIX: Error 3 — region was missing

      - name: Terraform destroy
        run: terraform destroy -auto-approve -var="ec2_public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" || true # wipe whatever exists
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1 # FIX: Error 3 — region was missing

      - name: Terraform apply
        run: terraform apply -auto-approve -var="ec2_public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" # FIX: pass public key into terraform so EC2 knows who is allowed to SSH in
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1 # FIX: Error 3 — region was missing

      - name: Read Terraform outputs # FIX: split into own step so apply fully completes before outputs are read
        run: |
          ECR_URI=$(terraform output -json ecr_uri | tr -d '"')
          EC2_IP=$(terraform output -json ec2_public_ip | tr -d '"')
          echo "ECR_URI=$ECR_URI"                  # print so value is visible in logs
          echo "EC2_IP=$EC2_IP"                    # print so value is visible in logs
          echo "ECR_URI=$ECR_URI" >> $GITHUB_ENV   # FIX: capture first then write — avoids quote mangling that caused ECR_URI to be empty
          echo "EC2_IP=$EC2_IP" >> $GITHUB_ENV     # FIX: $GITHUB_ENV persists vars into all subsequent steps
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1 # FIX: Error 3 — region was missing

      - name: Build & push Docker image to ECR
        run: |
          echo "ECR_URI=$ECR_URI" # FIX: now reads from $GITHUB_ENV set above, not re-queried here
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin $ECR_URI
          docker build -t $ECR_URI:latest .
          docker push $ECR_URI:latest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1 # FIX: Error 3 — region was missing

      - name: SSH into EC2 & run container
        run: |
          echo "EC2_IP=$EC2_IP" # FIX: now reads from $GITHUB_ENV set above, not re-queried here
          ssh -i ~/.ssh/cloud-pipeline \            # FIX: specify private key — without -i SSH has no key to present to EC2
              -o StrictHostKeyChecking=no \
              ec2-user@$EC2_IP "
            sudo yum install -y docker && sudo service docker start
            aws ecr get-login-password --region us-east-1 | \
              sudo docker login --username AWS --password-stdin $ECR_URI
            sudo docker pull $ECR_URI:latest
            sudo docker rm -f app 2>/dev/null || true
            sudo docker run -d --name app -p 80:5000 $ECR_URI:latest
            echo 'SUCCESS! Web server validation complete.'
          "
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1 # FIX: Error 3 — region was missing